<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelWithUs</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
       <nav><h1>TravelWithUs</h1>
        <li><a href="./index.html" id="home">Home</a></li>
        <li><a href="./about.html">About Us</a></li>
        <li><a href="./contact.html">Contact Us</a></li>
    </nav> 
    </header>
    <main>
        <h1>Contact Us</h1>
        <p>If you have any questions, feedback, or need assistance with your travel plans, please don't hesitate to reach out to us. We are here to help you make the most of your travel experience.</p>
        <form id="contactForm">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" required></textarea><br><br>
            <button type="submit">Submit</button>
    </main>
</body>
</html>
